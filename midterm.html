<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<link rel="icon" href="data:,">
<title>희곡의 이해 중간고사 퀴즈</title>
<style>
:root {
  color-scheme: light;
  --bg: #f5f7f8;
  --panel: #ffffff;
  --ink: #1f2937;
  --muted: #6b7280;
  --line: #d9e2e5;
  --accent: #0f766e;
  --accent-2: #1d4ed8;
  --soft: #e8f5f2;
  --good: #15803d;
  --good-bg: #ecfdf3;
  --bad: #dc2626;
  --bad-bg: #fef2f2;
  --note-bg: #fff7ed;
  --note-line: #fb923c;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 24px 16px 80px;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  line-height: 1.6;
}

.container { max-width: 820px; margin: 0 auto; }

header {
  padding: 22px 24px;
  margin-bottom: 16px;
  color: white;
  background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 100%);
  border-radius: 12px;
  box-shadow: 0 10px 28px rgba(15, 118, 110, 0.18);
}

.topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

h1 {
  margin: 0;
  font-size: 22px;
  line-height: 1.25;
  letter-spacing: 0;
}

.home-link {
  color: rgba(255,255,255,0.92);
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  padding: 6px 10px;
  white-space: nowrap;
}

header p {
  margin: 0;
  font-size: 14px;
  opacity: 0.92;
}

.pool-info {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.82;
}

.progress-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 12px 14px;
  margin-bottom: 14px;
  background: rgba(255,255,255,0.96);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(31, 41, 55, 0.06);
  backdrop-filter: blur(10px);
}

.progress-text {
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}

.progress-track {
  flex: 1;
  min-width: 130px;
  height: 8px;
  overflow: hidden;
  background: #e5e7eb;
  border-radius: 999px;
}

.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transition: width 0.25s ease;
}

.score-badge {
  padding: 4px 10px;
  color: white;
  background: var(--good);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}

.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filter-btn {
  padding: 6px 10px;
  border: 1.5px solid var(--line);
  background: var(--panel);
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.filter-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.result-card {
  display: none;
  padding: 22px;
  margin-bottom: 16px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(31, 41, 55, 0.07);
}

.result-card.show { display: block; }
.result-score {
  margin-bottom: 4px;
  color: var(--accent);
  font-size: 38px;
  font-weight: 900;
}
.result-detail { margin-bottom: 10px; color: var(--muted); font-size: 14px; }
.result-message { color: #111827; font-size: 15px; font-weight: 800; }
.result-breakdown {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}
.result-breakdown span {
  padding: 4px 10px;
  background: #f1f5f9;
  border-radius: 999px;
  color: #334155;
  font-size: 12px;
  font-weight: 700;
}

.question-card {
  padding: 19px;
  margin-bottom: 12px;
  background: var(--panel);
  border: 2px solid transparent;
  border-radius: 12px;
  box-shadow: 0 2px 10px rgba(31, 41, 55, 0.05);
  transition: border-color 0.2s;
}

.question-card.answered-correct { border-color: var(--good); }
.question-card.answered-wrong { border-color: var(--bad); }

.q-header {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.q-num {
  padding: 3px 9px;
  background: var(--soft);
  border-radius: 6px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 900;
}

.q-tag {
  padding: 2px 8px;
  color: #475569;
  background: #f1f5f9;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 800;
}

.q-star { color: #d97706; font-size: 12px; letter-spacing: 0; }
.q-text {
  margin: 0 0 13px;
  color: #111827;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.55;
}

.choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.choice {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  min-height: 44px;
  padding: 10px 12px;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  background: #fbfcfd;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}

.choice:hover {
  border-color: #5eead4;
  background: #effaf8;
}

.choice.selected {
  border-color: var(--accent);
  background: var(--soft);
}

.choice.correct {
  border-color: var(--good);
  background: var(--good-bg);
}

.choice.wrong {
  border-color: var(--bad);
  background: var(--bad-bg);
}

.choice.disabled {
  cursor: default;
}

.choice-num {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border: 1.5px solid #cbd5e1;
  border-radius: 999px;
  background: white;
  color: #64748b;
  font-size: 12px;
  font-weight: 900;
}

.choice.selected .choice-num {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.choice.correct .choice-num {
  border-color: var(--good);
  background: var(--good);
  color: white;
}

.choice.wrong .choice-num {
  border-color: var(--bad);
  background: var(--bad);
  color: white;
}

.choice-text {
  flex: 1;
  min-width: 0;
  color: #374151;
  font-size: 14px;
}

.explain {
  display: none;
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--note-bg);
  border-left: 4px solid var(--note-line);
  border-radius: 9px;
  color: #7c2d12;
  font-size: 13px;
}

.explain.show { display: block; }
.explain-label {
  margin-right: 6px;
  color: #9a3412;
  font-weight: 900;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 22px;
}

.btn {
  min-height: 42px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 800;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover { background: #115e59; }

.btn-secondary {
  border: 1.5px solid #99f6e4;
  background: white;
  color: var(--accent);
}

.btn-secondary:hover { background: var(--soft); }

footer {
  margin-top: 28px;
  text-align: center;
  color: #94a3b8;
  font-size: 11px;
}

@media (max-width: 640px) {
  body { padding: 12px 10px 72px; }
  header { padding: 16px; border-radius: 10px; }
  .topline { align-items: flex-start; }
  h1 { font-size: 18px; }
  .home-link { padding: 5px 8px; font-size: 12px; }
  header p { font-size: 12.5px; }
  .pool-info { font-size: 11px; }
  .progress-bar { gap: 8px; padding: 9px 10px; border-radius: 10px; }
  .progress-track { min-width: 90px; }
  .filter-btn { padding: 5px 9px; font-size: 11.5px; }
  .question-card { padding: 14px; border-radius: 10px; }
  .q-text { font-size: 14.5px; }
  .choice { min-height: 42px; padding: 9px 10px; gap: 9px; }
  .choice-text { font-size: 13.5px; }
  .explain { padding: 10px 11px; font-size: 12.5px; }
  .btn { flex: 1 1 auto; padding: 10px 14px; font-size: 13.5px; }
  .result-score { font-size: 32px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="topline">
      <h1>희곡의 이해 중간고사</h1>
      <a class="home-link" href="index.html">목록</a>
    </div>
    <p>1~7주차 · 165문제 풀에서 강의별 최대 5문제씩 랜덤 출제</p>
    <div class="pool-info" id="pool-info"></div>
  </header>

  <div class="progress-bar" aria-live="polite">
    <span class="progress-text" id="progress-text">0 / 210</span>
    <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="score-badge" id="score-badge">정답 0</span>
  </div>

  <div class="filter-bar" id="filter-bar"></div>

  <div class="result-card" id="result-card">
    <div class="result-score" id="result-score">0 / 210</div>
    <div class="result-detail" id="result-detail">정답률 0%</div>
    <div class="result-message" id="result-message"></div>
    <div class="result-breakdown" id="result-breakdown"></div>
  </div>

  <div id="quiz-container"></div>

  <div class="controls">
    <button class="btn btn-secondary" id="reset-btn" type="button">새 문제로 다시 풀기</button>
    <button class="btn btn-primary" id="submit-btn" type="button">결과 보기</button>
  </div>

  <footer>희곡의 이해 중간고사 · 개인 시험 대비용</footer>
</div>

<script>
window.QUIZ_CONFIG = {
  title: "희곡의 이해 중간고사",
  subtitle: "1~7주차 · 165문제 풀에서 강의별 최대 5문제씩 랜덤 출제",
  footer: "희곡의 이해 중간고사 · 개인 시험 대비용",
  weeks: ["1주차", "2주차", "3주차", "4주차", "5주차", "6주차", "7주차"],
  sourceFilter: q => /^(?:[1-7])-/.test(String(q.lec || ""))
};
</script>
<script src="questions.js"></script>
<script>
const CONFIG = window.QUIZ_CONFIG || {};
const ALL_POOL = window.QUESTION_POOL || [];
const POOL = ALL_POOL.filter(CONFIG.sourceFilter || (() => true));
const SOURCES = (CONFIG.sources || window.SOURCE_ORDER || [...new Set(POOL.map(getSource))])
  .filter(source => POOL.some(q => getSource(q) === source));
const WEEK_ORDER = (CONFIG.weeks || window.WEEK_ORDER || [])
  .filter(week => {
    const weekNum = week.replace("주차", "");
    return SOURCES.some(source => source.startsWith(weekNum + "-"));
  });
const PICK_PER_SOURCE = CONFIG.pickPerSource || 5;
if (CONFIG.title) document.title = CONFIG.title + " 퀴즈";
if (CONFIG.title) document.querySelector("h1").textContent = CONFIG.title;
if (CONFIG.subtitle) document.querySelector("header p").textContent = CONFIG.subtitle;
if (CONFIG.footer) document.querySelector("footer").textContent = CONFIG.footer;

function getSource(q) {
  const lec = typeof q === "string" ? q : q.lec;
  return String(lec || "기타");
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"]/g, c => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
  }[c]));
}

const state = {
  questions: [],
  answers: {},
  revealed: {},
  filter: "all",
  seenIds: new Set(),
};

function shuffleChoices(q) {
  const indexed = q.choices.map((choice, idx) => ({ choice, idx }));
  const shuffled = shuffle(indexed);
  return {
    ...q,
    choices: shuffled.map(x => x.choice),
    answer: shuffled.findIndex(x => x.idx === q.answer),
  };
}

function pickQuestions() {
  const picked = [];
  for (const source of SOURCES) {
    const pool = POOL.filter(q => getSource(q) === source);
    const count = Math.min(PICK_PER_SOURCE, pool.length);
    let available = pool.filter(q => !state.seenIds.has(q.id));
    if (available.length < count) {
      pool.forEach(q => state.seenIds.delete(q.id));
      available = pool.slice();
    }
    const chosen = shuffle(available).slice(0, count);
    chosen.forEach(q => state.seenIds.add(q.id));
    picked.push(...chosen.map(shuffleChoices));
  }
  return picked;
}

function newRound() {
  state.questions = pickQuestions();
  state.answers = {};
  state.revealed = {};
  state.filter = "all";
  document.getElementById("result-card").classList.remove("show");
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function render() {
  const container = document.getElementById("quiz-container");
  const indexed = state.questions.map((q, i) => ({ q, i }));
  const list = state.filter === "all" ? indexed : indexed.filter(x => getSource(x.q) === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const selected = state.answers[i];
    const revealed = state.revealed[i];
    const isCorrect = selected === q.answer;
    const cardClass = revealed ? (isCorrect ? "answered-correct" : "answered-wrong") : "";
    const stars = "★".repeat(q.star);

    const choicesHtml = q.choices.map((choice, ci) => {
      let cls = "choice";
      if (revealed) {
        cls += " disabled";
        if (ci === q.answer) cls += " correct";
        else if (ci === selected) cls += " wrong";
      } else if (selected === ci) {
        cls += " selected";
      }

      return `
        <div class="${cls}" data-qi="${i}" data-ci="${ci}" role="button" tabindex="0">
          <div class="choice-num">${ci + 1}</div>
          <div class="choice-text">${escapeHtml(choice)}</div>
        </div>
      `;
    }).join("");

    const explainHtml = revealed ? `
      <div class="explain show">
        <span class="explain-label">${isCorrect ? "정답" : "오답"}</span>
        ${escapeHtml(q.explain)}
      </div>
    ` : "";

    return `
      <article class="question-card ${cardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-tag">${escapeHtml(q.lec)}</span>
          <span class="q-star">${stars}</span>
        </div>
        <p class="q-text">${escapeHtml(q.q)}</p>
        <div class="choices">${choicesHtml}</div>
        ${explainHtml}
      </article>
    `;
  }).join("");

  container.querySelectorAll(".choice").forEach(el => {
    if (el.classList.contains("disabled")) return;

    const choose = () => {
      const qi = Number(el.dataset.qi);
      const ci = Number(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      render();
    };

    el.addEventListener("click", choose);
    el.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        choose();
      }
    });
  });

  updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  document.getElementById("progress-text").textContent = `${answered} / ${total}`;
  document.getElementById("progress-fill").style.width = total ? `${(answered / total) * 100}%` : "0%";
  document.getElementById("score-badge").textContent = `정답 ${correct}`;
}

function renderFilters() {
  const bar = document.getElementById("filter-bar");
  const items = ["all", ...SOURCES];
  bar.innerHTML = items.map(source => {
    const count = source === "all" ? state.questions.length : state.questions.filter(q => getSource(q) === source).length;
    const label = source === "all" ? `전체 (${count})` : `${source} (${count})`;
    const cls = state.filter === source ? "filter-btn active" : "filter-btn";
    return `<button class="${cls}" data-filter="${escapeHtml(source)}" type="button">${escapeHtml(label)}</button>`;
  }).join("");

  bar.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.filter = btn.dataset.filter;
      renderFilters();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById("pool-info");
  const weekCounts = WEEK_ORDER.map(week => {
    const weekNum = week.replace("주차", "");
    const count = SOURCES.filter(source => source.startsWith(`${weekNum}-`)).length;
    return count ? `${week} ${count}강` : "";
  }).filter(Boolean);
  info.textContent = `전체 문제 풀: ${POOL.length}문제 · 출제: 강의별 최대 ${PICK_PER_SOURCE}문제 (${weekCounts.join(" · ")})`;
}

document.getElementById("submit-btn").addEventListener("click", () => {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  const percent = total ? Math.round((correct / total) * 100) : 0;

  const breakdown = SOURCES.map(source => {
    const questions = state.questions.map((q, i) => ({ q, i })).filter(x => getSource(x.q) === source);
    const sourceCorrect = questions.filter(x => state.answers[x.i] === x.q.answer).length;
    return `${source} ${sourceCorrect}/${questions.length}`;
  });

  document.getElementById("result-score").textContent = `${correct} / ${total}`;
  document.getElementById("result-detail").textContent = `정답률 ${percent}% · 응답 ${answered}문제`;

  let message;
  if (percent >= 90) message = "핵심 개념이 안정적으로 잡혀 있습니다.";
  else if (percent >= 75) message = "오답 해설 위주로 한 번 더 정리하면 됩니다.";
  else if (percent >= 60) message = "자료별 약한 구간을 필터로 다시 확인하세요.";
  else message = "슬라이드 핵심어부터 다시 훑고 재도전하는 편이 좋습니다.";

  document.getElementById("result-message").textContent = message;
  document.getElementById("result-breakdown").innerHTML = breakdown.map(item => `<span>${escapeHtml(item)}</span>`).join("");
  const card = document.getElementById("result-card");
  card.classList.add("show");
  card.scrollIntoView({ behavior: "smooth", block: "start" });
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if (Object.keys(state.revealed).length === 0 || confirm(`새 문제 ${state.questions.length}개를 랜덤으로 뽑아 다시 시작할까요?`)) {
    newRound();
  }
});

renderPoolInfo();
newRound();
</script>
</body>
</html>
